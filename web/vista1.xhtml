<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

    <h:head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <h:outputStylesheet name="css/default.css"/>
        <h:outputStylesheet name="css/cssLayout.css"/>
        <title>Facelets Template</title>
    </h:head>

    <h:body>

        <div id="top" class="top">
            <h1 style="color: red; margin:0; padding:0; border: none; font-size: 16px;">GESTION EMPRESA</h1>
        </div>
        <div>
            <div id="left">
                <br />
                Hello from Facelets<br />
                <h:link outcome="welcomePrimefaces" value="Primefaces welcome page" /><br />
                <h:link outcome="/departamento/List" value="Show All Departamento Items"/><br />
                <h:link outcome="/empleado/List" value="Show All Empleado Items"/><br />
                <h:link outcome="/grafica" value="Ver Gráficas de Empleados"/><br />
            </div>
            <div id="right">
                right
            </div>
            <div id="content" class="right_content" style="height: 350px;">
                <ui:insert name="content">content</ui:insert>
            </div>
        </div>
        <div id="bottom" style="clear:both;">
            bottom
        </div>

    </h:body>

</html>
